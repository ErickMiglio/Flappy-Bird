<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Flappy Bird</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }
        #gameContainer {
            position: relative;
            border-radius: 10px;
            overflow: hidden;
            box-shadow: 0 0 30px rgba(0, 0, 0, 0.5);
        }
        canvas {
            display: block;
        }
        #startScreen, #gameOverScreen {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            background: rgba(0, 0, 0, 0.7);
            color: white;
            text-align: center;
        }
        #gameOverScreen {
            display: none;
        }
        h1 {
            font-size: 48px;
            color: #FFD700;
            text-shadow: 3px 3px 0 #FF6B35;
            margin-bottom: 20px;
        }
        .bird-icon {
            font-size: 80px;
            margin-bottom: 20px;
        }
        button {
            padding: 15px 40px;
            font-size: 20px;
            background: linear-gradient(145deg, #FFD700, #FFA500);
            border: none;
            border-radius: 30px;
            color: #1a1a2e;
            font-weight: bold;
            cursor: pointer;
            transition: transform 0.2s, box-shadow 0.2s;
        }
        button:hover {
            transform: scale(1.05);
            box-shadow: 0 5px 20px rgba(255, 215, 0, 0.5);
        }
        #scoreDisplay {
            font-size: 60px;
            color: #FFD700;
            text-shadow: 2px 2px 0 #FF6B35;
            margin-bottom: 20px;
        }
        .instructions {
            font-size: 18px;
            color: #ccc;
            margin-top: 15px;
        }
        #highScore {
            font-size: 24px;
            color: #4CAF50;
            margin-top: 10px;
        }
    </style>
</head>
<body>
    <div id="gameContainer">
        <canvas id="gameCanvas" width="400" height="600"></canvas>
        <div id="startScreen">
            <div class="bird-icon">🐦</div>
            <h1>FLAPPY BIRD</h1>
            <button id="startBtn">JOGAR</button>
            <p class="instructions">Pressione ESPAÇO ou CLIQUE para pular</p>
            <p id="highScore">Recorde: 0</p>
        </div>
        <div id="gameOverScreen">
            <h1>GAME OVER</h1>
            <div id="scoreDisplay">0</div>
            <p id="finalScore">Pontuação: 0</p>
            <p id="highScoreGame">Recorde: 0</p>
            <button id="restartBtn">JOGAR NOVAMENTE</button>
        </div>
    </div>

    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        const startScreen = document.getElementById('startScreen');
        const gameOverScreen = document.getElementById('gameOverScreen');
        const startBtn = document.getElementById('startBtn');
        const restartBtn = document.getElementById('restartBtn');
        const scoreDisplay = document.getElementById('scoreDisplay');
        const finalScoreEl = document.getElementById('finalScore');
        const highScoreEl = document.getElementById('highScore');
        const highScoreGameEl = document.getElementById('highScoreGame');

        let gameState = 'start';
        let score = 0;
        let highScore = localStorage.getItem('flappyHighScore') || 0;
        highScoreEl.textContent = `Recorde: ${highScore}`;

        const bird = {
            x: 80,
            y: canvas.height / 2,
            width: 40,
            height: 30,
            velocity: 0,
            gravity: 0.5,
            jump: -8,
            rotation: 0
        };

        const pipes = [];
        const pipeWidth = 60;
        const pipeGap = 150;
        let pipeSpeed = 3;
        let pipeSpawnTimer = 0;
        const pipeSpawnInterval = 90;

        const groundHeight = 80;
        let groundX = 0;
        const groundSpeed = 3;

        const clouds = [];
        for (let i = 0; i < 5; i++) {
            clouds.push({
                x: Math.random() * canvas.width,
                y: Math.random() * 200 + 20,
                width: Math.random() * 60 + 40,
                speed: Math.random() * 0.5 + 0.2
            });
        }

        function drawBackground() {
            const gradient = ctx.createLinearGradient(0, 0, 0, canvas.height);
            gradient.addColorStop(0, '#87CEEB');
            gradient.addColorStop(0.5, '#98D8E8');
            gradient.addColorStop(1, '#B0E0E6');
            ctx.fillStyle = gradient;
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            ctx.fillStyle = 'rgba(255, 255, 255, 0.8)';
            clouds.forEach(cloud => {
                ctx.beginPath();
                ctx.arc(cloud.x, cloud.y, cloud.width / 2, 0, Math.PI * 2);
                ctx.arc(cloud.x + cloud.width / 3, cloud.y - 10, cloud.width / 3, 0, Math.PI * 2);
                ctx.arc(cloud.x + cloud.width / 1.5, cloud.y, cloud.width / 2.5, 0, Math.PI * 2);
                ctx.fill();
            });
        }

        function drawGround() {
            ctx.fillStyle = '#8B4513';
            ctx.fillRect(0, canvas.height - groundHeight, canvas.width, groundHeight);
            
            ctx.fillStyle = '#228B22';
            ctx.fillRect(0, canvas.height - groundHeight, canvas.width, 20);
            
            ctx.fillStyle = '#654321';
            for (let i = 0; i < canvas.width; i += 30) {
                ctx.fillRect(i + (groundX % 30), canvas.height - groundHeight + 20, 20, 10);
            }
        }

        function drawBird() {
            ctx.save();
            ctx.translate(bird.x + bird.width / 2, bird.y + bird.height / 2);
            ctx.rotate(bird.rotation);

            ctx.fillStyle = '#FFD700';
            ctx.beginPath();
            ctx.ellipse(0, 0, bird.width / 2, bird.height / 2, 0, 0, Math.PI * 2);
            ctx.fill();

            ctx.fillStyle = '#FFA500';
            ctx.beginPath();
            ctx.ellipse(-bird.width / 4, 0, bird.width / 3, bird.height / 2.5, 0, 0, Math.PI * 2);
            ctx.fill();

            ctx.fillStyle = 'white';
            ctx.beginPath();
            ctx.arc(bird.width / 6, -bird.height / 6, 6, 0, Math.PI * 2);
            ctx.fill();
            ctx.fillStyle = 'black';
            ctx.beginPath();
            ctx.arc(bird.width / 5, -bird.height / 6, 3, 0, Math.PI * 2);
            ctx.fill();

            ctx.fillStyle = '#FF6B35';
            ctx.beginPath();
            ctx.moveTo(bird.width / 2, 0);
            ctx.lineTo(bird.width / 2 + 12, -5);
            ctx.lineTo(bird.width / 2 + 12, 5);
            ctx.closePath();
            ctx.fill();

            ctx.restore();
        }

        function drawPipe(pipe) {
            const gradient = ctx.createLinearGradient(pipe.x, 0, pipe.x + pipeWidth, 0);
            gradient.addColorStop(0, '#2E7D32');
            gradient.addColorStop(0.5, '#4CAF50');
            gradient.addColorStop(1, '#2E7D32');
            ctx.fillStyle = gradient;

            ctx.fillRect(pipe.x, 0, pipeWidth, pipe.topHeight);
            ctx.fillRect(pipe.x, pipe.topHeight + pipeGap, pipeWidth, canvas.height - pipe.topHeight - pipeGap - groundHeight);

            ctx.fillStyle = '#1B5E20';
            ctx.fillRect(pipe.x - 5, 0, 10, pipe.topHeight);
            ctx.fillRect(pipe.x - 5, pipe.topHeight + pipeGap, 10, 30);
            
            ctx.fillStyle = '#1B5E20';
            ctx.fillRect(pipe.x, pipe.topHeight - 15, pipeWidth, 15);
            ctx.fillRect(pipe.x, pipe.topHeight + pipeGap, pipeWidth, 15);

            ctx.fillStyle = 'rgba(255, 255, 255, 0.3)';
            ctx.fillRect(pipe.x + 5, 0, 10, pipe.topHeight - 20);
            ctx.fillRect(pipe.x + 5, pipe.topHeight + pipeGap + 15, 10, pipeGap - 30);
        }

        function updateBird() {
            bird.velocity += bird.gravity;
            bird.y += bird.velocity;
            bird.rotation = Math.min(Math.max(bird.velocity * 0.05, -0.5), 1.5);

            if (bird.y + bird.height > canvas.height - groundHeight) {
                bird.y = canvas.height - groundHeight - bird.height;
                bird.velocity = 0;
                gameOver();
            }
            if (bird.y < 0) {
                bird.y = 0;
                bird.velocity = 0;
            }
        }

        function updatePipes() {
            pipeSpawnTimer++;
            if (pipeSpawnTimer >= pipeSpawnInterval) {
                pipeSpawnTimer = 0;
                const minHeight = 80;
                const maxHeight = canvas.height - groundHeight - pipeGap - minHeight;
                const topHeight = Math.random() * (maxHeight - minHeight) + minHeight;
                pipes.push({
                    x: canvas.width,
                    topHeight: topHeight,
                    scored: false
                });
            }

            for (let i = pipes.length - 1; i >= 0; i--) {
                pipes[i].x -= pipeSpeed;

                if (!pipes[i].scored && pipes[i].x + pipeWidth < bird.x) {
                    pipes[i].scored = true;
                    score++;
                    scoreDisplay.textContent = score;
                }

                if (pipes[i].x + pipeWidth < -10) {
                    pipes.splice(i, 1);
                }
            }
        }

        function updateClouds() {
            clouds.forEach(cloud => {
                cloud.x -= cloud.speed;
                if (cloud.x + cloud.width < 0) {
                    cloud.x = canvas.width + cloud.width;
                    cloud.y = Math.random() * 200 + 20;
                }
            });
        }

        function updateGround() {
            groundX -= groundSpeed;
        }

        function checkCollision() {
            for (const pipe of pipes) {
                const birdLeft = bird.x;
                const birdRight = bird.x + bird.width;
                const birdTop = bird.y;
                const birdBottom = bird.y + bird.height;

                if (birdRight > pipe.x && birdLeft < pipe.x + pipeWidth) {
                    if (birdTop < pipe.topHeight || birdBottom > pipe.topHeight + pipeGap) {
                        return true;
                    }
                }
            }
            return false;
        }

        function jump() {
            if (gameState === 'playing') {
                bird.velocity = bird.jump;
            }
        }

        function startGame() {
            gameState = 'playing';
            score = 0;
            bird.y = canvas.height / 2;
            bird.velocity = 0;
            bird.rotation = 0;
            pipes.length = 0;
            pipeSpawnTimer = 0;
            pipeSpeed = 3;
            startScreen.style.display = 'none';
            gameOverScreen.style.display = 'none';
            scoreDisplay.textContent = '0';
        }

        function gameOver() {
            gameState = 'gameOver';
            if (score > highScore) {
                highScore = score;
                localStorage.setItem('flappyHighScore', highScore);
            }
            finalScoreEl.textContent = `Pontuação: ${score}`;
            highScoreGameEl.textContent = `Recorde: ${highScore}`;
            highScoreEl.textContent = `Recorde: ${highScore}`;
            gameOverScreen.style.display = 'flex';
        }

        function gameLoop() {
            drawBackground();

            if (gameState === 'playing') {
                updateBird();
                updatePipes();
                updateClouds();
                updateGround();

                if (checkCollision()) {
                    gameOver();
                }

                pipeSpeed = 3 + Math.floor(score / 10) * 0.5;
            } else {
                updateClouds();
            }

            pipes.forEach(drawPipe);
            drawGround();
            drawBird();

            requestAnimationFrame(gameLoop);
        }

        document.addEventListener('keydown', (e) => {
            if (e.code === 'Space') {
                e.preventDefault();
                if (gameState === 'start') {
                    startGame();
                } else if (gameState === 'playing') {
                    jump();
                } else if (gameState === 'gameOver') {
                    startGame();
                }
            }
        });

        canvas.addEventListener('click', () => {
            if (gameState === 'playing') {
                jump();
            }
        });

        startBtn.addEventListener('click', startGame);
        restartBtn.addEventListener('click', startGame);

        gameLoop();
    </script>
</body>
</html>
